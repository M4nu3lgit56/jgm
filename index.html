<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Gorras Pro</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:#e2e8f0;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

h1{text-align:center;}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 8px 20px rgba(0,0,0,.4);
}

.row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

input{
    padding:10px;
    border-radius:8px;
    border:none;
    background:#334155;
    color:white;
    width:100%;
    font-size:16px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:12px;
}

.material-item{
    background:#020617;
    padding:10px;
    border-radius:10px;
}

.material-item label{
    font-size:0.9em;
    font-weight:600;
}

button{
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
}

.add{
    background:#22c55e;
    color:white;
    width:100%;
    margin:20px 0;
}

.calc{background:#f59e0b;color:white;width:100%;margin-top:15px;}

.actions{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.copy{background:#3b82f6;color:white;width:100%;}
.img{background:#a855f7;color:white;width:100%;}

button:hover{transform:scale(1.05);}

.result{
    background:#020617;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Calculadora Profesional de Gorras</h1>

<div id="gorras"></div>
<button class="add" onclick="agregar()">+ Agregar otro color</button>

<div class="card">
<h3>Precios por material</h3>
<div class="grid">

<input id="tela" value="934" type="number" placeholder="Tela">
<input id="lino" value="450" type="number" placeholder="Lino">
<input id="pimpon" value="412.5" type="number" placeholder="Pimpón">
<input id="visera" value="480" type="number" placeholder="Visera">
<input id="correa" value="180" type="number" placeholder="Correa">
<input id="boton" value="65" type="number" placeholder="Botón">
<input id="marquilla" value="160" type="number" placeholder="Marquilla">
<input id="bandera" value="70" type="number" placeholder="Bandera">
<input id="etiqueta" value="70" type="number" placeholder="Etiqueta">
<input id="sesgoE" value="270" type="number" placeholder="Sesgo E">
<input id="sesgoT" value="31" type="number" placeholder="Sesgo T">
<input id="tira" value="168" type="number" placeholder="Tira">

</div>
</div>

<button class="calc" onclick="calcular()">Calcular</button>

<div class="actions">
<button class="copy" onclick="copiar()">Copiar texto</button>
<button class="img" onclick="descargar()">Descargar imagen</button>
</div>

<div id="resultado"></div>

</div>

<script>

let c=0;

function agregar(){
    c++;
    let div=document.createElement('div');
    div.className='card';
    div.innerHTML=`
        <div class="row">
            <input id="color${c}" placeholder="Color">
            <input id="cant${c}" type="number" placeholder="Cantidad">
        </div>
    `;
    document.getElementById('gorras').appendChild(div);
}

agregar();

function formato(num){
    return num.toLocaleString('es-CO');
}

function medida(valor){
    if(valor < 1){
        return (valor * 100).toFixed(0) + " cm";
    }
    return valor.toFixed(2) + " mt";
}

let textoGlobal="";

function calcular(){

let totalInv=0;
let totalGan=0;
let html="";
textoGlobal="";

let precios={
tela:+tela.value,
lino:+lino.value,
pimpon:+pimpon.value,
visera:+visera.value,
correa:+correa.value,
boton:+boton.value,
marquilla:+marquilla.value,
bandera:+bandera.value,
etiqueta:+etiqueta.value,
sesgoE:+sesgoE.value,
sesgoT:+sesgoT.value,
tira:+tira.value
};

for(let i=1;i<=c;i++){

let cant=+document.getElementById(`cant${i}`).value;
let color=document.getElementById(`color${i}`).value;

if(!cant) continue;

let telaMt = cant / 10;
let linoMt = cant / 55;
let pimponMt = cant / 55;
let sesgoEMt = cant;
let sesgoTMt = cant / 4;
let tiraMt = (cant * 60) / 100;

let costoUnitario = Object.values(precios).reduce((a,b)=>a+b,0);
let inversion = costoUnitario * cant;
let precioVenta = costoUnitario + 500;
let ganancia = (precioVenta - costoUnitario) * cant;

totalInv += inversion;
totalGan += ganancia;

html+=`
<div class="result">
<h3>${color}</h3>
<p>Tela: ${medida(telaMt)}</p>
<p>Lino: ${medida(linoMt)}</p>
<p>Pimpón: ${medida(pimponMt)}</p>
<p>Sesgo E: ${medida(sesgoEMt)}</p>
<p>Sesgo T: ${medida(sesgoTMt)}</p>
<p>Tira: ${medida(tiraMt)}</p>
<p>Inversión: $${formato(inversion)}</p>
<p>Venta: $${formato(precioVenta)}</p>
<p>Ganancia: $${formato(ganancia)}</p>
</div>
`;

textoGlobal += `
Color: ${color}
Cantidad: ${cant}
Inversión: $${formato(inversion)}
Venta: $${formato(precioVenta)}
Ganancia: $${formato(ganancia)}

`;
}

html+=`
<div class="result">
<h2>Total</h2>
<p>Inversión: $${formato(totalInv)}</p>
<p>Ganancia: $${formato(totalGan)}</p>
</div>
`;

textoGlobal += `
TOTAL
Inversión: $${formato(totalInv)}
Ganancia: $${formato(totalGan)}
`;

document.getElementById('resultado').innerHTML=html;

}

function copiar(){
    navigator.clipboard.writeText(textoGlobal);
    alert("Copiado al portapapeles");
}

function descargar(){
    html2canvas(document.getElementById('resultado')).then(canvas=>{
        let link=document.createElement('a');
        link.download="resultado.png";
        link.href=canvas.toDataURL();
        link.click();
    });
}

</script>

</body>
</html>
