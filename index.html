<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Profesional de Gorras</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:#e2e8f0;
}

.container {
    max-width:1100px;
    margin:auto;
    padding:20px;
}

h1 {
    text-align:center;
    margin-bottom:20px;
}

.card {
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
    animation:fadeIn .5s ease;
}

@keyframes fadeIn {
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1;}
}

.row {
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

input, select {
    padding:10px;
    border-radius:8px;
    border:none;
    background:#334155;
    color:white;
    width:100%;
}

button {
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#2563eb;
    color:white;
    transition:.3s;
}

button:hover {
    transform:scale(1.05);
    background:#1d4ed8;
}

.add-btn {
    background:#22c55e;
    width:100%;
    margin-top:10px;
}

.calcular {
    width:100%;
    margin-top:20px;
    background:#f59e0b;
}

.result {
    background:#020617;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
    animation:fadeIn .5s ease;
}

.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap:10px;
}
</style>
</head>

<body>

<div class="container">
<h1>Calculadora Profesional de Gorras</h1>

<div id="gorras"></div>

<button class="add-btn" onclick="agregarGorra()">+ Agregar otro color</button>

<div class="card">
<h3>Precios</h3>
<div class="grid">
<input type="number" id="tela" value="934">
<input type="number" id="lino" value="450">
<input type="number" id="pimpon" value="412.5">
<input type="number" id="visera" value="480">
<input type="number" id="correa" value="180">
<input type="number" id="boton" value="65">
<input type="number" id="marquilla" value="160">
<input type="number" id="bandera" value="70">
<input type="number" id="etiqueta" value="70">
<input type="number" id="sesgoE" value="270">
<input type="number" id="sesgoT" value="31">
<input type="number" id="tira" value="168">
</div>
</div>

<button class="calcular" onclick="calcular()">Calcular</button>

<div id="resultados"></div>

</div>

<script>

let contador = 0;

function agregarGorra(){
    contador++;

    let div = document.createElement('div');
    div.className = "card";
    div.innerHTML = `
        <div class="row">
            <input type="text" placeholder="Color" id="color${contador}">
            <input type="number" placeholder="Cantidad" id="cantidad${contador}">
        </div>
    `;
    document.getElementById('gorras').appendChild(div);
}

agregarGorra();

function calcular(){

    let precios = {
        tela: +tela.value,
        lino: +lino.value,
        pimpon: +pimpon.value,
        visera: +visera.value,
        correa: +correa.value,
        boton: +boton.value,
        marquilla: +marquilla.value,
        bandera: +bandera.value,
        etiqueta: +etiqueta.value,
        sesgoE: +sesgoE.value,
        sesgoT: +sesgoT.value,
        tira: +tira.value
    };

    let resultadosHTML = "";
    let totalGlobal = 0;
    let inversionGlobal = 0;

    for(let i=1;i<=contador;i++){

        let cantidad = document.getElementById(`cantidad${i}`).value;
        let color = document.getElementById(`color${i}`).value;

        if(!cantidad) continue;

        cantidad = +cantidad;

        // materiales
        let telaCm = 100 * cantidad;
        let linoCm = 1.8 * cantidad;
        let pimponCm = 1.8 * cantidad;
        let sesgoMetro = 1 * cantidad;
        let sesgoTraseroCm = 25 * cantidad;
        let tiraCm = 60 * cantidad;

        let costoUnitario = Object.values(precios).reduce((a,b)=>a+b,0);
        let inversion = costoUnitario * cantidad;
        let precioVenta = costoUnitario * 1.5;
        let ganancia = (precioVenta - costoUnitario) * cantidad;

        totalGlobal += ganancia;
        inversionGlobal += inversion;

        resultadosHTML += `
        <div class="result">
        <h3>Color: ${color}</h3>

        <p><b>Materiales:</b></p>
        <ul>
            <li>Tela: ${telaCm} cm (${(telaCm/100).toFixed(2)} mt)</li>
            <li>Lino Flex: ${linoCm.toFixed(2)} cm</li>
            <li>Pimpón: ${pimponCm.toFixed(2)} cm</li>
            <li>Sesgo estampado: ${sesgoMetro} mt</li>
            <li>Sesgo trasero: ${sesgoTraseroCm} cm</li>
            <li>Tira: ${tiraCm} cm</li>
        </ul>

        <p>Costo unitario: $${costoUnitario.toFixed(2)}</p>
        <p>Inversión: $${inversion.toFixed(2)}</p>
        <p>Precio venta: $${precioVenta.toFixed(2)}</p>
        <p>Ganancia: $${ganancia.toFixed(2)}</p>
        </div>
        `;
    }

    resultadosHTML += `
    <div class="result">
        <h2>Resultado Global</h2>
        <p>Inversión total: $${inversionGlobal.toFixed(2)}</p>
        <p>Ganancia total: $${totalGlobal.toFixed(2)}</p>
    </div>
    `;

    document.getElementById('resultados').innerHTML = resultadosHTML;
}

</script>

</body>
</html>
