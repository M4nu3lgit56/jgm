<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Gorras Pro</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="script.js" defer></script>
<link rel="stylesheet" href="styles.css">
<link rel="shortcut icon" href="img/logo.png" type="image/x-icon">
</head>

<body>

<div class="container">

<h1>Calculadora Profesional de Gorras</h1>

<div class="card accordion-header" onclick="toggleAccordion()">
  <h3>⚙️ Configuración de materiales</h3>
  <span class="accordion-icon">▼</span>
</div>

<div class="accordion-content" id="configAccordion">
  <div class="card">
    <h4>Tipo de gorra</h4>
    <div class="row">
      <label class="switch-label">
        <input type="checkbox" id="gorraMAlla" onchange="manejarMalla()">
        <span class="slider round"></span>
        Gorra de malla
      </label>
      <p class="info-text">Si está activado, usa maya en lugar de tela</p>
    </div>
  </div>

  <div class="card">
    <h4>Precios y cantidades de materiales</h4>
    <div id="materialesConfig"></div>
    <button class="add-material" onclick="agregarMaterialPersonalizado()">+ Agregar material personalizado</button>
  </div>
</div>

<div id="gorras">
    <div class="card" style="
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
    ">
        <div>
            <label style="display: block; margin-bottom: 10px;"><b>Cantidad total de gorras</b></label>
            <input id="cantidadGorras" type="number" placeholder="Cantidad" style="max-width: 150px;">
            <p class="info-text" style="margin-top: 5px;">Se desactiva cuando especificas colores individuales con cantidades</p>
        </div>
    </div>

    <div id="coloresGorra" class="card">
        <h3>Colores de las partes</h3>
        <div id="partesColores"></div>
    </div>
</div>

<button class="add" onclick="agregarOtroColor()">+ Agregar otro color</button>

<button class="calc" onclick="calcular()">Calcular</button>

<div id="resultado"></div>

</div>

</body>
</html>
