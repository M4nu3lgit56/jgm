<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Gorras Pro</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="script.js" defer></script>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

<h1>Calculadora Profesional de Gorras</h1>

<div id="gorras"></div>
<button class="add" onclick="agregar()">+ Agregar otro color</button>

<div class="card">
<h3>Precios por material</h3>
<div class="grid">

<div class="material-item"><label>Tela (por gorra)</label><input class="material_price" id="tela" value="934" type="number"></div>
<div class="material-item"><label>Lino Flex</label><input class="material_price" id="lino" value="450" type="number"></div>
<div class="material-item"><label>Pimpón</label><input class="material_price" id="pimpon" value="412.5" type="number"></div>
<div class="material-item"><label>Visera</label><input class="material_price" id="visera" value="480" type="number"></div>
<div class="material-item"><label>Correa</label><input class="material_price" id="correa" value="180" type="number"></div>
<div class="material-item"><label>Botón</label><input class="material_price" id="boton" value="65" type="number"></div>
<div class="material-item"><label>Marquilla</label><input class="material_price" id="marquilla" value="160" type="number"></div>
<div class="material-item"><label>Bandera</label><input class="material_price" id="bandera" value="70" type="number"></div>
<div class="material-item"><label>Etiqueta</label><input class="material_price" id="etiqueta" value="70" type="number"></div>
<div class="material-item"><label>Sesgo estampado (mt)</label><input class="material_price" id="sesgoE" value="270" type="number"></div>
<div class="material-item"><label>Sesgo trasero</label><input class="material_price" id="sesgoT" value="31" type="number"></div>
<div class="material-item"><label>Tira</label><input class="material_price" id="tira" value="168" type="number"></div>
<div class="material-item"><label>Precio de venta</label><input class="material_price" id="precioVenta" value="500" type="number"></div>

</div>
</div>

<button class="calc" onclick="calcular()">Calcular</button>

<div id="resultado"></div>

</div>

</body>
</html>
